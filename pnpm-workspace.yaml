packages:
  - "apps/*"
  - "packages/*"

catalog:
  typescript: "^6.0.3"
  vitest: "^4.1.9"
  "@vitest/coverage-v8": "4.1.9"
  tsx: "4.22.4"
  zod: "^4.4.3"
  svelte: "^5.56.4"
  "@prisma/client": "^7.8.0"
  "@prisma/adapter-pg": "^7.8.0"
  pg: "^8.22.0"
  prisma: "^7.8.0"

allowBuilds:
  "@prisma/engines": true
  esbuild: true
  prisma: true
# Supply-chain release cooldown (pnpm 11 default is 1440 = 1 day).
# Declared explicitly because minimumReleaseAgeExclude is only honored when
# minimumReleaseAge is set. Only packages we deliberately track at the
# bleeding edge belong here — use name patterns, never name@version pins.
minimumReleaseAge: 0
# Svelte core is tracked at the bleeding edge for this starter kit, so it is
# exempted from the cooldown. Name patterns only (no version pins).
minimumReleaseAgeExclude:
  - svelte
  - "@sveltejs/kit"
