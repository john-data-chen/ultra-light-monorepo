sonar.projectKey=john-data-chen_ultra-light-monorepo
sonar.organization=john-data-chen

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=ultra-light-monorepo
#sonar.projectVersion=1.0

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources = .

# Include only files in src directory
sonar.inclusions = src/**/*

# Exclude everything else
sonar.exclusions = src/static/**, **.spec.ts, **.css, ./playwright.config.ts

# coverage
sonar.coverage.exclusions = src/**/*