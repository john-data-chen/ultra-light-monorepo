<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.dir%">
  <head>
    <meta charset="utf-8" />
    <title>SvelteKit Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <script nonce="%sveltekit.nonce%">
      // Theme bootstrap: runs before first paint to avoid a flash of the wrong theme.
      // Reads the `theme` cookie (default dark) and resolves `system` via the OS preference.
      (() => {
        const m = document.cookie.match(/(?:^|;\s*)theme=(dark|light|system)/);
        const pref = m ? m[1] : "dark";
        const dark =
          pref === "dark" ||
          (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
